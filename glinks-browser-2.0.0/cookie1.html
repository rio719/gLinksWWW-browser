<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>gLinks Cookie Manager</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            background-color: #c0c0c0; /* 클래식 윈도우 회색 */
            font-family: 'Tahoma', 'Arial', sans-serif;
            font-size: 12px;
            padding: 20px;
        }
        h2 {
            color: #000080;
            border-bottom: 2px solid #808080;
            padding-bottom: 5px;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background-color: white;
            box-shadow: inset 2px 2px #808080, inset -2px -2px #ffffff;
        }
        th {
            background-color: #d4d0c8;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px;
            text-shadow: 1px 1px white;
        }
        td {
            padding: 6px;
            border: 1px solid #eeeeee;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* 클래식 버튼 스타일 */
        button {
            padding: 4px 12px;
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 1px 1px 0px black;
        }
        button:active {
            border: 2px inset #ffffff;
            box-shadow: none;
        }
        button.delete-btn {
            color: #a00000;
        }
         button.nuclear-btn {
            color: #c4b702;
        }
        .vault-container {
            border: 2px inset #ffffff;
            padding: 10px;
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <h2 id="title">🍪 gLinksWWW Cookie Manager</h2>
    <div class="vault-container">
        <button class="nuclear-btn" onclick="nuclearClear()">NUCLEAR BUTTON</button>
        <table>
            <thead>
                <tr>
                    <th>Domain</th>
                   
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cookie-list">
                </tbody>
        </table>
    </div>



<script>
let pyBridge = null;

// 1. URL에서 도메인 추출
const urlParams = new URLSearchParams(window.location.search);
const domain = urlParams.get('domain');

document.addEventListener('DOMContentLoaded', () => {
    // domain이 없어도 기본 제목은 나오게 처리
    if (domain) {
        const titleElement = document.getElementById('title');
        if (titleElement) titleElement.innerText = `🍪 ${domain} Cookie Manager`;
    }
    setupBridge();
});

function setupBridge() {
    if (typeof QWebChannel === 'undefined' || typeof qt === 'undefined') {
        console.error('QWebChannel not available.');
        return;
    }
    new QWebChannel(qt.webChannelTransport, function(channel) {
        pyBridge = channel.objects.py_bridge;
        loadDomainCookies();
    });
}

function loadDomainCookies() {
    if (!pyBridge || !domain) return;
    pyBridge.get_cookies_for_domain(domain, (result) => {
        let cookies = [];
        try {
            cookies = JSON.parse(result || "[]");
        } catch (e) {
            cookies = [];
        }
        renderCookieList(cookies);
    });
}

// 3. 리스트 나열 (tr 태그 추가!)
function renderCookieList(cookies) {
    const listContainer = document.getElementById('cookie-list');
    if (!cookies || cookies.length === 0) {
        listContainer.innerHTML = '<tr><td colspan="2">No cookies found.</td></tr>';
        return;
    }

    listContainer.innerHTML = cookies.map(cookie => `
        <tr>
            <td>
                <span><strong>${cookie.name}</strong>: ${cookie.value.substring(0, 20)}...</span>
            </td>
            <td>
                <button onclick="openEditModal('${cookie.name}', '${encodeURIComponent(cookie.value)}')">Edit</button>
            </td>
        </tr>
    `).join('');
}

function openEditModal(name, encodedValue) {
    // 1. 현재 cookie1.html이 알고 있는 'domain' 변수를 활용합니다.
    // 2. 쿠키 이름(name)과 도메인을 쿼리 스트링으로 넘깁니다.
    // 값(value)은 어차피 cookieedit.html에서 다시 불러올 거라 이름만 정확히 넘기면 됩니다!
    
    const targetUrl = `cookieedit.html?domain=${encodeURIComponent(domain)}&name=${encodeURIComponent(name)}`;
    
    window.location.href = targetUrl;
}

function nuclearClear() {
    if (!domain) return;
    if (!confirm(`Are you sure you want to delete all cookies for ${domain}?`)) {
        return;
    }
    if (!pyBridge) return;
    pyBridge.delete_cookies(domain, () => {
        loadDomainCookies();
    });
}
</script>
</body>
</html>
