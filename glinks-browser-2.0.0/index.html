
<!DOCTYPE html> 
<html>
<head>
  <!-- QWebChannel 스크립트 로드 (PyQt6 제공) -->
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <style>
    /* index.html */
    body { margin: 0; background: #ffffff; font-family: 'Times New Roman', serif; }
    .toolbar1 { 
      height: 30px; display: flex; align-items: center; padding: 0 10px; gap: 10px; background: #b89f79;
      border-top: 2px solid #ffffff; border-left: 2px solid #fff;
      border-right: 2px solid #292929; border-bottom: 2px solid  #292929;
    }
    .toolbar { 
      height: 40px; display: flex; align-items: center; padding: 0 10px; gap: 10px; background: #b89f79;
      border-top: 2px solid #ffffff; border-left: 2px solid #fff;
      border-right: 2px solid #292929; border-bottom: 2px solid  #292929;
    }
    input { 
      outline: none; /* 주황색 테두리 제거 */
      flex: 1; padding: 5px; background: white;
      border-right: 2px solid #292929; border-bottom: 2px solid  #292929;
      border-right: 2px solid #fff; border-bottom: 2px solid #fff;
    }
    button { 
      padding: 5px 15px; background: #b89f79; font-weight: bold;
      border-top: 2px solid #fff; border-left: 2px solid #fff;
      border-right: 2px solid #292929; border-bottom: 2px solid  #292929;
      cursor: pointer;
    }
    button:active {
      border-right: 2px solid #292929; border-bottom: 2px solid  #292929;
      border-right: 2px solid #fff; border-bottom: 2px solid #fff;
    }
    b,span {color:#ffffff}
    .tab-btn {
    background: #b89f79; border: 2px outset #fff; color: white; 
    margin-left: 5px; cursor: pointer; font-size: 10px;
  }
  /* 예전 지링스 입체 버튼 스타일 */
    .tab {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        background: #b89f79; /* 기본 갈색 */
        border: 2px outset #eee; /* 입체 효과 */
        cursor: pointer;
        margin-right: 2px;
        font-family: 'Times New Roman', serif;
        font-size: 13px;
    }

    /* 마우스를 올렸을 때 */
    .tab:hover { background: #a68d66; }

    /* 선택된 탭 (더 어두운 갈색 + 눌린 효과) */
    .tab.active {
        background: #8e7956; 
      
        color: white;
    }

    .tab img { margin-right: 6px; border: 1px solid #777; background: white; }
    .close-btn { margin-left: 8px; color: #600; font-weight: bold; }
    
    #plus-btn {
        padding: 2px 8px;
        background: #b89f79;
        border: 2px outset #eee;
        cursor: pointer;
        font-weight: bold;
    }
    /* home.html 또는 style.css */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* 전체 페이지 스크롤은 막고 */
}

/* 텔레그램이나 웹사이트가 들어가는 컨테이너 */
#content-area {
    width: 100%;
    height: calc(100vh - 50px); /* 탭 바 높이가 50px이라면 그만큼 빼고 나머지 꽉 채우기 */
    display: block;
}

webview, iframe {
    width: 100%;
    height: 100%;
    border: none;
}
/* 우클릭 메뉴 전체 컨테이너 */
.retro-menu {
    background-color: #D2B48C; /* 연한 갈색 (Tan) */
    border-top: 2px solid white;
    border-left: 2px solid white;
    border-bottom: 2px solid black;
    border-right: 2px solid black;
    padding: 4px;
    width: 180px;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
}

/* 메뉴 아이템 하나하나 */
.menu-item-slot,.menu-item {
    background-color: #D2B48C; /* 기본 연한 갈색 */
    border-top: 2px solid white;
    border-left: 2px solid white;
    border-bottom: 2px solid black;
    border-right: 2px solid black;
    padding: 8px 12px;
    margin: 2px;
    cursor: pointer;
    color: black;
    font-weight: bold;
}

/* 리오님이 원하신 Hover 효과 */
.menu-item-slot,.menu-item:hover {
    background-color: #8B4513; /* 진한 갈색 (SaddleBrown) */
    color: white; /* 어두운 배경에선 글자를 밝게 */
}

/* 버튼을 눌렀을 때 쏙 들어가는 느낌을 주려면? (추가 팁) */
.menu-item-slot,.menu-item:active {
    border-top: 2px solid black;
    border-left: 2px solid black;
    border-bottom: 2px solid white;
    border-right: 2px solid white;
}
/* 슬롯들을 가로로 예쁘게 배치 */
.slot-grid {
    display: flex;
    gap: 3px;
    padding: 5px;
    margin-bottom: 5px;
}
  </style>
</head>
<body>
  <div class="toolbar1">
<b>gL-2.0.0</b>
  <div id="tab-bar" style=" padding: 4px; display: flex; align-items: center;">
    <div id="tabs-container" style="display: flex; overflow-x: auto;">
        </div>
    <button id="plus-btn" onclick="addNewTab()"><b>+</b></button>
</div>
  </div>
  <div class="toolbar">
    <button id="backBtn">◀</button>
  <button id="forwardBtn">▶</button>
  <button id="reloadBtn">🔄</button>
    <input type="text" id="urlInput" placeholder="write a URL here (example: https://google.com)" />
    <button id="goBtn">Go!</button>
    <button id="homeBtn" >Home</button>
    <button id="clboardmanager" >📄</button> 
    <button id="CookieBtn" >🍪</button>
    
    
  </div>
  
 
  <script>
    // ===== QWebChannel 브릿지 초기화 =====
    let py_bridge = null;

    // QWebChannel 초기화
    if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
        new QWebChannel(qt.webChannelTransport, function(channel) {
            py_bridge = channel.objects.py_bridge;
            console.log("✅ [gLinks] QWebChannel 연결 완료!");
            
            // 초기 UI 로드
            if (window.onPyBridgeReady) {
                window.onPyBridgeReady();
            }
        });
    } else {
        console.warn("[gLinks] QWebChannel 사용 불가 - 일렉트론 모드");
    }

    // 일렉트론 API 에뮬레이션
    window.electronAPI = {
        // 클립보드
        saveClipboard: async (slot, content) => {
            if (py_bridge) py_bridge.save_clipboard(slot, content);
        },
        getClipboard: async (slot) => {
            if (py_bridge) return py_bridge.get_clipboard(slot);
            return "";
        },
        getAllClipboards: async () => {
            if (py_bridge) {
                const result = py_bridge.get_all_clipboards();
                return JSON.parse(result);
            }
            return {};
        },
        
        // 탭 관리
        createTab: async (url) => {
            if (py_bridge) py_bridge.create_tab(url || "");
        },
        switchTab: async (index) => {
            if (py_bridge) py_bridge.switch_tab(index);
        },
        closeTab: async (index) => {
            if (py_bridge) py_bridge.close_tab(index);
        },
        navigate: async (url) => {
            if (py_bridge) py_bridge.navigate(url);
        },
        goBack: async () => {
            if (py_bridge) py_bridge.go_back();
        },
        goForward: async () => {
            if (py_bridge) py_bridge.go_forward();
        },
        reload: async () => {
            if (py_bridge) py_bridge.reload_page();
        },
        getCurrentUrl: async () => {
            if (py_bridge) return py_bridge.get_current_url();
            return "";
        },
        getCurrentTitle: async () => {
            if (py_bridge) return py_bridge.get_current_title();
            return "새 탭";
        },
        
        // 쿠키
        getCookieValue: async (data) => {
            if (py_bridge) return py_bridge.get_cookie_value(data.domain, data.name);
            return "";
        },
        saveCookie: async (data) => {
            if (py_bridge) py_bridge.save_cookie(data.domain, data.name, data.value);
        }
    };

    // Python에서 호출할 수 있는 전역 함수
    window.updateTabsFromPython = function(data) {
        console.log("[gLinks] 탭 업데이트 수신:", data);
        if (window.onTabsUpdated) {
            window.onTabsUpdated(data);
        }
    };

    console.log("✅ [gLinks] QWebChannel 브릿지 로드 완료!");
    
    // ===== PyQt6 버전: DOM 로드 후 이벤트 바인딩 =====
    document.addEventListener('DOMContentLoaded', function() {
        console.log("[gLinks] DOM 로드 완료, 이벤트 바인딩 시작");
        
        // 버튼 클릭 이벤트
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const goBtn = document.getElementById('goBtn');
        const homeBtn = document.getElementById('homeBtn');
        const clboardmanager = document.getElementById('clboardmanager');
        const cookieBtn = document.getElementById('CookieBtn');
        const urlInput = document.getElementById('urlInput');
        
        if (backBtn) backBtn.onclick = () => window.electronAPI.goBack();
        if (forwardBtn) forwardBtn.onclick = () => window.electronAPI.goForward();
        if (reloadBtn) reloadBtn.onclick = () => window.electronAPI.reload();
        
        if (goBtn) {
            goBtn.onclick = () => {
                const url = urlInput ? urlInput.value : "";
                if (url) window.electronAPI.navigate(url);
            };
        }
        
        if (urlInput) {
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    window.electronAPI.navigate(urlInput.value);
                }
            });
        }
        
        // Home 버튼 - 절대 경로로 변환
        if (homeBtn) {
            homeBtn.onclick = () => {
                const path = window.location.pathname.replace('/index.html', '/home.html');
                window.electronAPI.navigate('file://' + path);
            };
        }
     
        // 클립보드 매니저
        if (clboardmanager) {
            clboardmanager.onclick = () => {
                const path = window.location.pathname.replace('/index.html', '/clipboard.html');
                window.electronAPI.navigate('file://' + path);
            };
        }
        
        // 쿠키 매니저
        if (cookieBtn) {
            cookieBtn.onclick = () => {  
                const path = window.location.pathname.replace('/index.html', '/cookie.html');
                window.electronAPI.navigate('file://' + path);
            };
        }
        
        console.log("[gLinks] 모든 이벤트 바인딩 완료");
    });


// 탭 추가 버튼 클릭 시
function addNewTab() {
  const currentTabs = document.querySelectorAll('.tab').length; 

  if (currentTabs >= 7) {
    alert('max 7 Tab Allowed');
    return; 
  }
  window.electronAPI.createTab("");
}

// Python에서 탭 업데이트를 받는 콜백 함수
window.onTabsUpdated = function({ tabList, activeIndex }) {
    const container = document.getElementById('tabs-container');
    container.innerHTML = ''; // 기존 탭을 싹 비우고 새로 그림

    tabList.forEach((tab, i) => {
        const tabEl = document.createElement('div');
        // 활성화된 탭은 active 클래스를 붙여서 어둡게 표시
        tabEl.className = `tab ${i === activeIndex ? 'active' : ''}`;
        
        // 탭 클릭 시 해당 번호로 전환
        tabEl.onclick = () => window.electronAPI.switchTab(i);
        
        // 제목이 너무 길면 자르기
        const displayTitle = tab.title.length > 12 ? tab.title.substring(0, 10) + '..' : tab.title;
        tabEl.innerHTML = `
            <img src="${tab.icon}" width="16" height="16" onerror="this.src='default-icon.png'">
            <span>${displayTitle}</span>
            <span class="close-btn">×</span>
        `;
        
        // [중요] x 버튼에 삭제 이벤트 연결
        const closeBtn = tabEl.querySelector('.close-btn');
        closeBtn.onclick = (e) => {
            e.stopPropagation(); // 탭이 바뀌지 않게 클릭 이벤트 전파 막기
            window.electronAPI.closeTab(i);
        };

        container.appendChild(tabEl);
    });
    
    // 주소창 업데이트(현재 탭 URL 실시간 반영)
    if (tabList[activeIndex]) {
        const urlInput = document.getElementById('urlInput');
        if (urlInput) {
            urlInput.value = tabList[activeIndex].url || '';
        }
    }
};
// 우클릭 메뉴 처리 (PyQt6에서는 기본 우클릭 메뉴 사용 가능)
// 필요시 커스텀 메뉴 구현 가능
</script>
  </script>
</body>
</html>
